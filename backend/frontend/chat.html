<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomplin - Your AI Goblin Coach</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(255, 255, 255, 0.05);
            --panel-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #ef4444; /* Changed to red/fire for the goblin theme */
            --accent-hover: #dc2626;
            --msg-sent: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            --msg-received: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .hidden {
            display: none !important;
        }

        /* --- Login Screen --- */
        .login-container {
            width: 90%;
            max-width: 400px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: containerAppear 0.5s ease-out forwards;
            text-align: center;
        }

        .login-header h2 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fca5a5, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .login-header p {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 14px 16px 14px 44px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .input-group input:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
        }

        .input-group svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            width: 20px;
            height: 20px;
            transition: color 0.3s ease;
        }
        
        .input-group input:focus + svg {
            color: var(--accent);
        }

        .login-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .login-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.5);
        }
        
        .login-btn:active {
            transform: scale(0.98);
        }
        
        #login-error {
            color: #f87171;
            font-size: 0.85rem;
            margin-top: 8px;
            display: none;
        }

        /* --- Chat Application --- */
        .chat-container {
            width: 95%;
            max-width: 1200px;
            height: 90vh;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            display: flex;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: containerAppear 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes containerAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Sidebar */
        .sidebar {
            width: 340px;
            border-right: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.15);
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--panel-border);
        }

        .sidebar-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #fca5a5, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .contact-list::-webkit-scrollbar {
            width: 6px;
        }
        .contact-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .contact {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }

        .contact.active {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--panel-border);
            margin-right: 16px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 1.2rem;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #10b981;
            border: 2px solid #1e1b4b;
            border-radius: 50%;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .contact-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.05);
            position: relative;
        }

        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
        }

        .chat-user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chat-user-details h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .chat-user-details p {
            font-size: 0.85rem;
            color: #10b981;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-user-details p::before {
            content: "";
            display: block;
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
        }

        .messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .msg-container {
            display: flex;
            gap: 12px;
            max-width: 75%;
            animation: messageAppear 0.4s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes messageAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-container.received {
            align-self: flex-start;
        }

        .msg-container.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            align-self: flex-end;
            background: var(--panel-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 600;
        }
        
        .msg-avatar.goblin {
            background: #ef4444;
            color: white;
        }
        
        .msg-avatar.user {
            background: #6366f1;
            color: white;
        }

        .msg-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .msg {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            white-space: pre-wrap;
        }

        .received .msg {
            background: var(--msg-received);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .sent .msg {
            background: var(--msg-sent);
            border-bottom-right-radius: 4px;
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.2);
        }

        .msg-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .sent .msg-time {
            text-align: right;
        }

        /* Chat Input */
        .chat-input-container {
            padding: 20px 24px;
            border-top: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.02);
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .chat-input-container input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 14px 20px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .chat-input-container input:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(239, 68, 68, 0.5);
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
        }

        .send-btn {
            background: var(--accent);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.5);
        }
        
        .send-btn:active {
            transform: scale(0.95);
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 18px;
            background: var(--msg-received);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
            margin-bottom: 10px;
            display: none;
        }
        
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(-4px); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 860px) {
            .sidebar {
                width: 280px;
            }
        }
        @media (max-width: 768px) {
            .chat-container {
                flex-direction: column;
                height: 100vh;
                width: 100%;
                border-radius: 0;
            }
            .sidebar {
                width: 100%;
                height: 20vh;
                border-right: none;
                border-bottom: 1px solid var(--panel-border);
            }
            .chat-area {
                height: 80vh;
            }
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen" class="login-container">
        <div class="login-header">
            <h2>Pomplin</h2>
            <p>Sign in to talk to the goblin</p>
        </div>
        <form class="login-form" onsubmit="handleLogin(event)">
            <div class="input-group">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <input type="text" id="username" placeholder="Username" required autocomplete="off">
            </div>
            <div class="input-group">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div id="login-error"></div>
            <button type="submit" class="login-btn" id="login-submit-btn">Login & Wake Goblin</button>
        </form>
    </div>

    <!-- Main Chat App -->
    <div id="app-screen" class="chat-container hidden">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #ef4444;">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                    </svg>
                    Pomplin Sessions
                </h2>
            </div>

            <div class="contact-list">
                <div class="contact active">
                    <div class="avatar" style="background: #ef4444; font-size: 1.5rem;">
                        🔥
                        <div class="status"></div>
                    </div>
                    <div class="contact-info">
                        <div class="contact-header-row">
                            <span class="contact-name">Current Session</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Current User profile -->
            <div style="padding: 16px; border-top: 1px solid var(--panel-border); display: flex; align-items: center; justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="avatar" id="current-user-avatar" style="width: 36px; height: 36px; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);">
                        U
                    </div>
                    <div style="font-size: 0.9rem; font-weight: 500;" id="current-user-name">User</div>
                </div>
                <button onclick="handleLogout()" style="background: none; border: none; color: var(--text-secondary); cursor: pointer;" title="Logout">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-user-info">
                    <div class="avatar" style="background: #ef4444; font-size: 1.5rem;">
                        🔥
                        <div class="status"></div>
                    </div>
                    <div class="chat-user-details">
                        <h3>Pomplin</h3>
                        <p>Awake & Screeching</p>
                    </div>
                </div>
            </div>

            <div class="messages" id="chat-messages">
                <div class="typing-indicator" id="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <div class="chat-input-container">
                <div class="input-wrapper">
                    <input type="text" id="message-input" placeholder="Type a message to the goblin..." onkeypress="handleKeyPress(event)">
                </div>

                <button class="send-btn" title="Send Message" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE_URL = 'http://localhost:8000';
        
        let currentUser = {
            username: '',
            token: null
        };
        
        let chatWebSocket = null;

        // Handle Login via API
        async function handleLogin(event) {
            event.preventDefault();
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            const submitBtn = document.getElementById('login-submit-btn');
            
            if (!usernameInput || !passwordInput) return;
            
            errorDiv.style.display = 'none';
            submitBtn.textContent = 'Authenticating...';
            submitBtn.disabled = true;
            
            try {
                // Post form data exactly how OAuth2PasswordRequestForm expects it
                const formData = new URLSearchParams();
                formData.append('username', usernameInput);
                formData.append('password', passwordInput);
                
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok && data.access_token) {
                    currentUser.username = usernameInput;
                    currentUser.token = data.access_token;
                    
                    // Update UI
                    document.getElementById('current-user-name').innerText = usernameInput;
                    document.getElementById('current-user-avatar').innerText = usernameInput.charAt(0).toUpperCase();
                    
                    // Transition screens
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app-screen').classList.remove('hidden');
                    
                    // Connect WebSocket
                    connectWebSocket();
                } else {
                    errorDiv.textContent = data.detail || 'Login failed. Incorrect credentials?';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                console.error('Login error:', err);
                errorDiv.textContent = 'Could not connect to the backend server. Is it running on port 8000?';
                errorDiv.style.display = 'block';
            } finally {
                submitBtn.textContent = 'Login & Wake Goblin';
                submitBtn.disabled = false;
            }
        }
        
        // Handle Logout
        function handleLogout() {
            if (chatWebSocket) {
                chatWebSocket.close();
                chatWebSocket = null;
            }
            
            currentUser.token = null;
            
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            
            document.getElementById('chat-messages').innerHTML = `
                <div class="typing-indicator" id="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }

        // Establish WebSocket Connection
        function connectWebSocket() {
            // Check if there is an existing connection
            if (chatWebSocket) {
                chatWebSocket.close();
            }

            const wsUrl = `ws://localhost:8000/ws/chat?token=${currentUser.token}`;
            chatWebSocket = new WebSocket(wsUrl);

            const typingIndicator = document.getElementById('typing-indicator');

            chatWebSocket.onopen = () => {
                console.log('Connected to Pomplin via WebSocket!');
                // We show typing indicator while waiting for his initial greeting
                typingIndicator.style.display = 'flex';
            };

            chatWebSocket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.role === 'model') {
                        // Hide typing indicator
                        typingIndicator.style.display = 'none';
                        // Add message to UI
                        addMessageToUI(data.content, 'received');
                        
                        // Handle tool results if any (like roadmap preview)
                        if (data.tool_result && data.tool_result.status === 'preview' && data.tool_result.roadmap) {
                            addMessageToUI(`*ROADMAP PREVIEW*\n${JSON.stringify(data.tool_result.roadmap, null, 2)}`, 'received');
                        }
                    }
                } catch (e) {
                    console.error('Error parsing WS message:', e, event.data);
                }
            };

            chatWebSocket.onerror = (error) => {
                console.error('WebSocket Error:', error);
                typingIndicator.style.display = 'none';
            };

            chatWebSocket.onclose = (event) => {
                console.log('WebSocket Disconnected', event);
                typingIndicator.style.display = 'none';
            };
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const messageText = input.value.trim();
            
            if (messageText && chatWebSocket && chatWebSocket.readyState === WebSocket.OPEN) {
                // Send to backend
                chatWebSocket.send(JSON.stringify({ content: messageText }));
                
                // Add to UI
                addMessageToUI(messageText, 'sent');
                input.value = '';
                
                // Show typing indicator
                const typingIndicator = document.getElementById('typing-indicator');
                typingIndicator.style.display = 'flex';
                
                const messagesContainer = document.getElementById('chat-messages');
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            } else if (!chatWebSocket || chatWebSocket.readyState !== WebSocket.OPEN) {
                alert("Connection lost. Please refresh or relogin.");
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
        
        function addMessageToUI(text, type) {
            const messagesContainer = document.getElementById('chat-messages');
            const typingIndicator = document.getElementById('typing-indicator');
            
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            let msgHTML = '';
            
            if (type === 'sent') {
                msgHTML = `
                    <div class="msg-container sent">
                        <div class="msg-content">
                            <div class="msg">${escapeHtml(text)}</div>
                            <span class="msg-time">${timeString}</span>
                        </div>
                    </div>
                `;
            } else {
                msgHTML = `
                    <div class="msg-container received">
                        <div class="msg-avatar goblin">🔥</div>
                        <div class="msg-content">
                            <div class="msg">${escapeHtml(text)}</div>
                            <span class="msg-time">${timeString}</span>
                        </div>
                    </div>
                `;
            }
            
            typingIndicator.insertAdjacentHTML('beforebegin', msgHTML);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    </script>
</body>
</html>
